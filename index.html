<!doctype html>
<html lang="en">
  <head>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&family=Geist:wght@100..900&display=swap");
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />

    <!-- =============================================
         BASIC SEO
    ============================================= -->
    <title>BF Suma Medical Products | Authentic Health & Wellness Store</title>
    <meta
      name="description"
      content="Shop authentic BF Suma medical products online. Explore our full range of health supplements, wellness solutions, and medical-grade products. Fast delivery, guaranteed quality."
    />
    <meta
      name="keywords"
      content="BF Suma, BF Suma products, BF Suma medical, buy BF Suma online, BF Suma supplements, BF Suma health products, BF Suma wellness, medical products online, health supplements store"
    />
    <meta name="author" content="BF Suma Official Store" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.yourdomain.com/" />

    <!-- =============================================
         VIEWPORT & MOBILE
    ============================================= -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a4d2e" />

    <!-- =============================================
         OPEN GRAPH (Facebook, WhatsApp, LinkedIn)
    ============================================= -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BF Suma Official Store" />
    <meta
      property="og:title"
      content="BF Suma Medical Products | Authentic Health & Wellness Store"
    />
    <meta
      property="og:description"
      content="Shop authentic BF Suma medical products online. Explore our full range of health supplements, wellness solutions, and medical-grade products. Fast delivery, guaranteed quality."
    />
    <meta property="og:url" content="https://www.yourdomain.com/" />
    <meta
      property="og:image"
      content="https://www.yourdomain.com/og-image.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="BF Suma Medical Products Store" />
    <meta property="og:locale" content="en_US" />

    <!-- =============================================
         TWITTER / X CARD
    ============================================= -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="BF Suma Medical Products | Authentic Health & Wellness Store"
    />
    <meta
      name="twitter:description"
      content="Shop authentic BF Suma medical products online. Health supplements, wellness solutions and more. Fast delivery, guaranteed quality."
    />
    <meta
      name="twitter:image"
      content="https://www.yourdomain.com/og-image.jpg"
    />
    <meta name="twitter:image:alt" content="BF Suma Medical Products Store" />

    <!-- =============================================
         STRUCTURED DATA (Google Rich Results)
         Schema.org – Organization + WebSite + Sitelinks Search
    ============================================= -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://www.yourdomain.com/#organization",
            "name": "BF Suma Official Store",
            "url": "https://www.yourdomain.com/",
            "logo": {
              "@type": "ImageObject",
              "url": "https://www.yourdomain.com/logo.png",
              "width": 200,
              "height": 60
            },
            "description": "Authorised retailer of authentic BF Suma medical and health products including supplements, wellness solutions and medical-grade health products.",
            "sameAs": [
              "https://www.facebook.com/yourpage",
              "https://www.instagram.com/yourpage",
              "https://twitter.com/yourpage"
            ],
            "contactPoint": {
              "@type": "ContactPoint",
              "contactType": "customer service",
              "availableLanguage": ["English"]
            }
          },
          {
            "@type": "WebSite",
            "@id": "https://www.yourdomain.com/#website",
            "url": "https://www.yourdomain.com/",
            "name": "BF Suma Official Store",
            "publisher": {"@id": "https://www.yourdomain.com/#organization"},
            "potentialAction": {
              "@type": "SearchAction",
              "target": {
                "@type": "EntryPoint",
                "urlTemplate": "https://www.yourdomain.com/search?q={search_term_string}"
              },
              "query-input": "required name=search_term_string"
            }
          },
          {
            "@type": "Store",
            "@id": "https://www.yourdomain.com/#store",
            "name": "BF Suma Official Store",
            "url": "https://www.yourdomain.com/",
            "image": "https://www.yourdomain.com/og-image.jpg",
            "description": "Shop authentic BF Suma medical products including health supplements, nutritional products and wellness solutions.",
            "priceRange": "$$",
            "servesCuisine": null,
            "hasMap": "https://maps.google.com/?q=Your+Store+Location"
          }
        ]
      }
    </script>

    <!-- =============================================
         FAVICON & APP ICONS
    ============================================= -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- =============================================
         PERFORMANCE HINTS
    ============================================= -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
